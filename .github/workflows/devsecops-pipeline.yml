name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        working-directory: ./app
        run: npm ci || npm install

      - name: Run Tests
        working-directory: ./app
        run: npm test

  security-sast-sca:
    name: Code & Dependency Security Scanning (SAST/SCA)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run npm audit (SCA)
        working-directory: ./app
        run: npm audit --audit-level=high

      - name: Run Trivy Vulnerability Scanner (SAST on Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  container-security:
    name: Container Build & Image Scanning
    runs-on: ubuntu-latest
    needs: security-sast-sca
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        working-directory: ./app
        run: docker build -t my-devsecops-app:latest .

      - name: Run Trivy vulnerability scanner on Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-devsecops-app:latest'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  deploy-to-k8s:
    name: Simulate Deployment to Kubernetes
    runs-on: ubuntu-latest
    needs: container-security
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Verify K8s Manifests (Dry-run deployment)
        run: |
          echo "Simulating CI/CD deployment to Kubernetes cluster..."
          kubectl create apply -f k8s/deployment.yaml --dry-run=client
          kubectl create apply -f k8s/service.yaml --dry-run=client
          echo "Deployment manifests validated successfully."
